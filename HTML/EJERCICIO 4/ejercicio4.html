<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 4</title>
</head>
<body>
    <form>
        <label for="nombreCompleto">Nombre Completo:</label>
        <input type="text" id="nombreCompleto" name="nombreCompleto" required placeholder="Introduce tu nombre completo"><br><br>

        <label for="email" >Correo electrónico:</label>
        <input type="email" id="email" name="email" required pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" placeholder="Introduce tu email"><br><br>
    
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" required placeholder="Introduce tu contraseña"><br><br>
    
        <label for="password2">Confirma tu contraseña</label>
        <input type="password" id="password2" name="password2" required placeholder="Confirma tu contraseña"><br><br>
    
        <label for="teléfono" >Teléfono:</label>
        <input type="tel" id="teléfono" name="teléfono" required pattern="[0-9]{9}" placeholder="Introduce tu teléfono"><br><br>
    
        <label for="fechaNacimiento">Fecha de Nacimiento:</label>
        <input type="date" id="fechaNacimiento" name="fechaNacimiento" required><br><br>    

    
        <label for="pais" >¿Cuál es tu país de nacimiento?:</label>
        <select id="pais" name="pais" required>
            <option value="" disabled selected>Seleccione tu país</option>
            <option value="españa">España</option>
            <option value="mexico">México</option>
            <option value="argentina">Argentina</option>
            <option value="colombia">Colombia</option>
            <option value="chile">Chile</option>
        </select><br><br>
    
        <label>Género</label>
        <input type="radio" id="masculino" name="genero" value="masculino" required>
        <label for="masculino">Masculino</label>
        <input type="radio" id="femenino" name="genero" value="femenino" required>
        <label for="femenino">Femenino</label>
        <input type="radio" id="otro" name="genero" value="otro" required>
        <label for="otro">Otro</label><br><br>

        <label for="color">Selecciona tu color favorito:</label>
        <input type="color" id="color" name="color" value="#345678"><br><br>

        <label for="rango">Nivel de satisfacción (0-100):</label>
        <input type="range" id="rango" name="rango" min="0" max="100" step="20"><br><br>
       
        <label for="fotoPerfil" >Sube tu foto de perfil:</label><br><br>
        <input type="file" id="fotoPerfil" name="fotoPerfil" accept="image/*"><br><br>    
        
        <label for="aceptarTerminos">Aceptar términos y condiciones</label><br><br>
        <input type="checkbox" id="aceptar Terminos" name="aceptarTerminos" required>
        <br><br>

        <input  type="submit" value="Enviar">
        <input type="reset" value="Restablecer">

        <br><br><br><br><br><br>
    </form>
        
</body>
</html>
